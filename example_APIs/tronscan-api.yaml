openapi: 3.0.0
info:
  title: Tronscan API
  version: 1.0.0
  description: TRON blockchain explorer API for querying accounts, transactions, blocks,
    and smart contracts
  contact:
    name: Tronscan Team
    url: https://tronscan.org
  license:
    name: Apache 2.0
servers:
- url: https://apilist.tronscan.org
paths:
  /api/account:
    get:
      summary: Get account information by address
      tags:
      - Accounts
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
  /api/account/{address}/votes:
    get:
      summary: Get voting information for an account
      tags:
      - Accounts
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
  /api/accountlist:
    get:
      summary: Get paginated list of accounts
      tags:
