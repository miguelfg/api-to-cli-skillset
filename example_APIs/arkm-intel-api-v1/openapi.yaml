  /transfers:
    get:
      summary: Get transfers
      description: 'Retrieves a list of transfers based on various query filters.


        **Rate Limit**: This endpoint has a stricter rate limit of 1 request per second.


        **Filter parameters:**

        - **base**: Filter by specific entity or address. For example, "0x123abc"
        or "binance".

        - **chains**: Specify a comma-separated list of chains (e.g. "ethereum,bsc").

        - **flow**: Direction of the transfer. Valid values are "in" (incoming), "out"
        (outgoing), "self" (self-transfers), or "all".

        - **from**: Comma-separated list of addresses, entities, or deposit services
        for the ''from'' side of a transfer. You can also use special syntax like
        "type:cex" to filter on entity types or "deposit:binance" to filter on deposit
        addresses.

        - **to**: Comma-separated list of addresses, entities, or deposit services
        for the ''to'' side.

        - **tokens**: Comma-separated list of token addresses or token IDs. E.g. "ethereum",
        "usd-coin", or "0x...tokenAddress".

        - **counterparties**: Comma-separated list of addresses or entities to treat
        strictly as counterparties (only base <-> counterparty transfers).

        - **timeLast**: Filter transfers from a recent duration. For example, "24h"
        returns transfers from the last 24 hours.

        - **timeGte/timeLte**: Filter from/to a specific timestamp in milliseconds.

        - **valueGte/valueLte**: Numeric filters on the raw token amount (on-chain
        units).

        - **usdGte/usdLte**: Numeric filters on the historical USD value of the transfer.

        - **sortKey**: Field by which to sort the results. Options include "time",
        "value", or "usd".

        - **sortDir**: Sorting direction. Use "asc" for ascending or "desc" for descending.

        - **limit**: Maximum number of results to return (default is 50).

