openapi: 3.0.0
info:
  title: Arkham Intel API
  version: 1.1.0
paths:
  /arkm/circulating:
    get:
      summary: Get ARKM circulating supply
      description: Retrieves the circulating supply of ARKM tokens based on the current
        time
      operationId: GetARKMCirculating
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetARKMCirculatingResponse'
        '500':
          description: Internal Server Error
  /balances/address/{address}:
    get:
      summary: Get token balances for an address
      description: Returns token balances for the specified address, optionally filtered
        by chains.
      operationId: GetAddressBalances
      parameters:
      - name: chains
        in: query
        description: Comma-separated list of chains to filter by (e.g., 'ethereum,bsc,polygon').
          If omitted, returns balances across all supported chains.
        schema:
          type: string
          description: Comma-separated list of chains to filter by (e.g., 'ethereum,bsc,polygon').
            If omitted, returns balances across all supported chains.
      - name: address
        in: path
        description: The blockchain address to query balances for.
        required: true
        schema:
          type: string
          description: The blockchain address to query balances for.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/addressBalancesResp'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /balances/entity/{entity}:
    get:
      summary: Get token balances for an entity
      description: Returns token balances for the specified entity, optionally filtered
        by chains.
      operationId: GetEntityBalances
      parameters:
      - name: cheap
        in: query
        description: If 'true', uses a faster but less comprehensive balance query.
        schema:
          type: string
          description: If 'true', uses a faster but less comprehensive balance query.
      - name: chains
        in: query
        description: Comma-separated list of chains to filter by (e.g., 'ethereum,bsc,polygon').
          If omitted, returns balances across all supported chains.
        schema:
          type: string
          description: Comma-separated list of chains to filter by (e.g., 'ethereum,bsc,polygon').
            If omitted, returns balances across all supported chains.
      - name: entity
        in: path
        description: The entity ID to query balances for (e.g., 'binance', 'coinbase').
        required: true
        schema:
          type: string
          description: The entity ID to query balances for (e.g., 'binance', 'coinbase').
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/entityBalancesResp'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /balances/solana/subaccounts/address/{addresses}:
    get:
      summary: Get Solana subaccount balances for addresses
      description: Returns token balances from Solana subaccounts (staking, lending,
        etc.) for the specified addresses.
      operationId: GetSolanaAddressSubaccountBalances
      parameters:
      - name: pricingID
        in: query
        description: The CoinGecko pricing ID of the token to query subaccount balances
          for (e.g., 'solana' for native SOL). Required. Filters results to balances
          of this token.
        schema:
          type: string
          description: The CoinGecko pricing ID of the token to query subaccount balances
            for (e.g., 'solana' for native SOL). Required. Filters results to balances
            of this token.
      - name: limit
        in: query
        description: Maximum number of subaccount balance entries to return (default
          1000).
        schema:
          type: string
          description: Maximum number of subaccount balance entries to return (default
            1000).
      - name: addresses
        in: path
        description: Comma-separated list of Solana addresses to query subaccount
          balances for.
        required: true
        schema:
          type: string
          description: Comma-separated list of Solana addresses to query subaccount
            balances for.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubaccountBalances'
                example:
                - address: abc123
                  balance: 1.23
                  balanceExact: abc123
                  id: abc123
                  name: abc123
                  ownerAddress: abc123
                  price: 1.23
                  symbol: abc123
                  usd: 1.23
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /balances/solana/subaccounts/entity/{entities}:
    get:
      summary: Get Solana subaccount balances for entities
      description: Returns token balances from Solana subaccounts (staking, lending,
        etc.) for the specified entities.
      operationId: GetSolanaEntitySubaccountBalances
      parameters:
      - name: pricingID
        in: query
        description: The CoinGecko pricing ID of the token to query subaccount balances
          for (e.g., 'solana' for native SOL). Required. Filters results to balances
          of this token.
        schema:
          type: string
          description: The CoinGecko pricing ID of the token to query subaccount balances
            for (e.g., 'solana' for native SOL). Required. Filters results to balances
            of this token.
      - name: limit
        in: query
        description: Maximum number of subaccount balance entries to return (default
          1000).
        schema:
          type: string
          description: Maximum number of subaccount balance entries to return (default
            1000).
      - name: entities
        in: path
        description: Comma-separated list of entity IDs to query subaccount balances
          for (e.g., 'binance', 'coinbase').
        required: true
        schema:
          type: string
          description: Comma-separated list of entity IDs to query subaccount balances
            for (e.g., 'binance', 'coinbase').
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubaccountBalances'
                example:
                - address: abc123
                  balance: 1.23
                  balanceExact: abc123
                  id: abc123
                  name: abc123
                  ownerAddress: abc123
                  price: 1.23
                  symbol: abc123
                  usd: 1.23
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /chains:
    get:
      summary: Get supported chains list
      description: Retrieves a list of supported blockchain chains. The response is
        a simple JSON array of chain identifiers.
      operationId: GetSupportedChains
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  example: abc123
                example:
                - abc123
        '500':
          description: Internal Server Error
  /cluster/{id}/summary:
    get:
      summary: Get cluster summary statistics
      description: "Returns summary statistics for the specified cluster, including:\n\
        - Total number of unique addresses in the cluster\n- Total balance in USD\n\
        - Total transaction volume in USD\n- First and last transaction timestamps\n\
        \n**Data sources:**\n- For large clusters (>10 addresses): Returns precomputed\
        \ data from cluster_page_summary table\n- For small clusters (\u226410 addresses):\
        \ Calculates summary on the fly from raw data\n\nClusters are groups of addresses\
        \ that have been linked together through on-chain heuristics (e.g., Bitcoin\
        \ input clustering)."
      operationId: GetClusterSummary
      parameters:
      - name: id
        in: path
        description: The cluster ID to retrieve summary statistics for.
        required: true
        schema:
          type: string
          description: The cluster ID to retrieve summary statistics for.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterSummary'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /counterparties/address/{address}:
    get:
      summary: Get top counterparties for an address
      description: 'Returns aggregated counterparty activity by volume for the specified
        address.


        Supports filtering by transfer direction, chain, token, time range, and transaction
        value.


        **Rate Limit**: This endpoint has a stricter rate limit of 1 request per second.'
      operationId: GetAddressCounterParty
      parameters:
      - name: base
        in: query
        description: 'Filter by specific entity or address. For example: ''0x123abc''
          or ''binance''.'
        schema:
          $ref: '#/components/schemas/CommaDelimitedString'
      - name: chains
        in: query
        description: 'Comma-separated list of chains. For example: ''ethereum,bsc''.'
        schema:
          type: string
          description: 'Comma-separated list of chains. For example: ''ethereum,bsc''.'
      - name: flow
        in: query
        description: 'Transfer direction: ''in'' for incoming, ''out'' for outgoing,
          ''self'' for self-transfers, or ''all'' for all transfers.'
        schema:
          type: string
          description: 'Transfer direction: ''in'' for incoming, ''out'' for outgoing,
            ''self'' for self-transfers, or ''all'' for all transfers.'
      - name: from
        in: query
        description: Comma-separated list of addresses, entities, or deposit services
          for the 'from' side. You can also use special syntax like 'type:cex' to
          filter on entity types or 'deposit:binance' to filter on deposit addresses.
        schema:
          $ref: '#/components/schemas/CommaDelimitedString'
      - name: to
        in: query
        description: Comma-separated list of addresses, entities, or deposit services
          for the 'to' side.
        schema:
          $ref: '#/components/schemas/CommaDelimitedString'
      - name: tokens
        in: query
        description: Comma-separated list of token addresses or token IDs. E.g. 'ethereum',
          'usd-coin', or '0x...tokenAddress'.
        schema:
          $ref: '#/components/schemas/CommaDelimitedString'
      - name: timeGte
        in: query
        description: Time range filter (from) in milliseconds (e.g. 1696630274000).
        schema:
          type: string
          description: Time range filter (from) in milliseconds (e.g. 1696630274000).
      - name: timeLte
        in: query
        description: Time range filter (to) in milliseconds (e.g. 1696716674000).
        schema:
          type: string
          description: Time range filter (to) in milliseconds (e.g. 1696716674000).
      - name: timeLast
        in: query
        description: 'Time range filter using relative durations. For example: ''24h''
          for transfers in the last 24 hours, ''7d'' for last 7 days.'
        schema:
          type: string
          description: 'Time range filter using relative durations. For example: ''24h''
            for transfers in the last 24 hours, ''7d'' for last 7 days.'
      - name: valueGte
        in: query
        description: Minimum raw token value (on-chain units).
        style: deepObject
        explode: true
        schema:
          $ref: '#/components/schemas/SafeDecimal'
      - name: valueLte
        in: query
        description: Maximum raw token value (on-chain units).
        style: deepObject
        explode: true
        schema:
          $ref: '#/components/schemas/SafeDecimal'
      - name: usdGte
        in: query
        description: Minimum historical USD value.
        style: deepObject
        explode: true
        schema:
          $ref: '#/components/schemas/SafeDecimal'
      - name: usdLte
        in: query
        description: Maximum historical USD value.
        style: deepObject
        explode: true
        schema:
          $ref: '#/components/schemas/SafeDecimal'
      - name: sortKey
        in: query
        description: Field by which to sort the results. Options include 'time', 'value',
          or 'usd'.
        schema:
          type: string
          description: Field by which to sort the results. Options include 'time',
            'value', or 'usd'.
      - name: sortDir
        in: query
        description: Sorting direction. Use 'asc' for ascending or 'desc' for descending.
        schema:
          type: string
          description: Sorting direction. Use 'asc' for ascending or 'desc' for descending.
      - name: limit
        in: query
        description: Maximum number of results to return.
        schema:
          type: integer
          description: Maximum number of results to return.
      - name: offset
        in: query
        description: Pagination offset.
        schema:
          type: integer
          description: Pagination offset.
      - name: counterparties
        in: query
        description: Comma-separated list of addresses or entities to treat strictly
          as counterparties (only base <-> counterparty transfers).
        schema:
          $ref: '#/components/schemas/CommaDelimitedString'
      - name: last
        in: query
        description: 'Time range filter using relative durations. For example: ''24h''
          for transfers in the last 24 hours, ''7d'' for last 7 days. Cannot be used
          with ''timeLte'' or ''timeGte''.'
        schema:
          type: string
          description: 'Time range filter using relative durations. For example: ''24h''
            for transfers in the last 24 hours, ''7d'' for last 7 days. Cannot be
            used with ''timeLte'' or ''timeGte''.'
      - name: tags
        in: query
        description: Comma-separated list of counterparty tags to filter by (e.g.,
          'cex,defi').
        schema:
          $ref: '#/components/schemas/CommaDelimitedString'
      - name: address
        in: path
