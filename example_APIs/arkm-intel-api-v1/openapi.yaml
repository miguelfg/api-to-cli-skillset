    get:
      summary: Get entity summary statistics
      description: 'Returns precomputed or calculated summary statistics for the specified
        entity, including:

        - Total number of unique addresses (deduplicated across chains)

        - Total balance in USD across all chains

        - Total transfer volume in USD

        - First and last transfer timestamps


        **Supports both Arkham entities and user entities:**

        - For Arkham entities (e.g., "binance"): Returns precomputed data when available,
        falls back to calculation

        - For user entities: Always calculates on the fly

        - Includes user-added addresses for Arkham entities when authenticated


        **Shareable user entities:** If a user entity is marked as shareable, any
        authenticated or unauthenticated user can access the summary.'
      operationId: GetEntitySummary
      parameters:
      - name: entity
        in: path
        description: The entity ID to retrieve summary statistics for (e.g., 'binance',
          'coinbase', or a user entity ID).
