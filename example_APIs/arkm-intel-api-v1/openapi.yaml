        description: Comma-separated list of chains to filter by (e.g., 'ethereum,bsc,polygon').
        schema:
          type: string
          description: Comma-separated list of chains to filter by (e.g., 'ethereum,bsc,polygon').
      - name: entity
        in: path
        description: The entity ID to query transfer volume for (e.g., 'binance',
          'coinbase').
        required: true
        schema:
          type: string
          description: The entity ID to query transfer volume for (e.g., 'binance',
            'coinbase').
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    $ref: '#/components/schemas/VolumeSnapshot'
                  example:
                  - time: abc123
                    volumes:
                    - depositedUSD: 1.23
                      exchangeID: abc123
                      exchangeName: abc123
                      withdrawnUSD: 1.23
                example:
                  abc123:
                  - time: abc123
                    volumes:
                    - depositedUSD: 1.23
                      exchangeID: abc123
                      exchangeName: abc123
                      withdrawnUSD: 1.23
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /ws/active_connections:
    get:
      summary: Get active WebSocket connections
      description: Returns the number of active WebSocket connections for the authenticated
        user.
      operationId: GetActiveWebSocketConnections
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetActiveWebSocketConnectionsResponse'
        '500':
          description: Internal Server Error
  /ws/session-info:
    get:
      summary: Get WebSocket pricing info
      description: Returns the current pricing information for WebSocket sessions,
        including the credit cost per session creation and per transfer received.
      operationId: GetWebSocketSessionInfo
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebSocketSessionInfoResponse'
        '500':
          description: Internal Server Error
  /ws/sessions:
    get:
      summary: List WebSocket sessions
      description: Returns all WebSocket sessions for the authenticated user, including
        usage statistics and connection status.
      operationId: GetWebSocketSessions
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebSocketSessionResponse'
                example:
                - createdAt: abc123
                  isActive: true
                  isConnected: true
                  sessionId: abc123
                  transfersUsed: 1
        '500':
          description: Internal Server Error
    post:
      summary: Create WebSocket session
      description: 'Creates a new WebSocket session for real-time transfer streaming.


        You must create a session before connecting to the WebSocket stream. The returned
        sessionId should be passed as a query parameter when connecting: wss://api.arkm.com/ws/transfers?session_id=<sessionId>


        **Billing:** Session creation costs API credits. Check GET /ws/session-info
        for current pricing.'
      operationId: CreateWebSocketSession
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateWebSocketSessionResponse'
        '500':
          description: Internal Server Error
  /ws/sessions/{id}:
    delete:
      summary: Delete WebSocket session
      description: Deletes a WebSocket session. Any active connection using this session
        will be disconnected.
      operationId: DeleteWebSocketSession
      parameters:
      - name: id
        in: path
        description: The session ID to delete
        required: true
        schema:
          type: string
          description: The session ID to delete
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                  example: abc123
                example:
                  abc123: abc123
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
    get:
      summary: Get WebSocket session status
      description: Returns the status and usage details for a specific WebSocket session,
        including transfer count and connection status.
      operationId: GetWebSocketSessionStatus
      parameters:
      - name: id
        in: path
        description: The session ID to retrieve
        required: true
        schema:
          type: string
          description: The session ID to retrieve
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebSocketSessionResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /ws/transfers:
    get:
      summary: WebSocket transfer streaming
      description: 'WebSocket endpoint for streaming real-time blockchain transfers.


        **Getting Started:**

        1. Create a session by calling POST /ws/sessions - this returns a sessionId

        2. Connect to wss://api.arkm.com/ws/transfers?session_id=<your-session-id>
        with your API-Key header

        3. Send a subscribe message with your transfer filters to start receiving
        data


        **Query Parameters:**

        - session_id (required) - Your session ID from POST /ws/sessions

        - fresh (optional) - Set to true to clear pending notifications from a previous
        connection


        **Client Messages:**

        - subscribe: Create a filter to receive matching transfers (1 per session)

        - unsubscribe: Remove your filter by ID


        **Server Messages:**

        - transfer: Real-time transfer notification matching your filters

        - ack: Acknowledgment for successful operations

        - error: Error notifications (codes: INVALID_PAYLOAD, INVALID_FILTER, FILTER_EXISTS,
        NO_SESSION, INTERNAL_ERROR)


        **Filter Requirements:**

        - Must include at least one of: base, from, to, tokens, or usdGte >= 10,000,000


        **Billing:** Each transfer received consumes API credits.'
      operationId: HandleWebSocketTransfers
      responses:
        '101':
          description: Switching Protocols
        '500':
          description: Internal Server Error
