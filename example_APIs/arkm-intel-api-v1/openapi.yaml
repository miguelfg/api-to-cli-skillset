  /swaps:
    get:
      summary: Get swaps
      description: 'Retrieves a list of swaps (DEX trades) based on various query
        filters.


        **Rate Limit**: This endpoint has a stricter rate limit of 1 request per second.


        **Filter parameters:**

        - **base**: Filter by specific entity or address involved in the swap. Required
        (returns empty results if omitted).

        - **chains**: Specify a comma-separated list of chains (e.g. "ethereum,bsc").

        - **flow**: Direction of the swap relative to base address. Valid values are
        "in" (receiving token1), "out" (sending token0), or "all".

        - **from**: Filter by sender addresses or entities.

        - **to**: Filter by receiver addresses or entities.

        - **tokens**: Comma-separated list of token addresses or token IDs that appear
        in either token0 or token1.

        - **timeLast**: Filter swaps from a recent duration (e.g. "24h", "7d").

        - **timeGte/timeLte**: Filter from/to a specific timestamp in milliseconds.

        - **usdGte/usdLte**: Numeric filters on the historical USD value of the swap.

        - **sortKey**: Field by which to sort the results. Options include "time"
        or "usd".

        - **sortDir**: Sorting direction. Use "asc" for ascending or "desc" for descending.

        - **limit**: Maximum number of results to return (default is 20).

        - **offset**: Pagination offset (default is 0).'
      operationId: GetSwapsFromElastic
      parameters:
      - name: base
        in: query
        description: Filter by specific entity or address involved in the swap.
        schema:
          $ref: '#/components/schemas/CommaDelimitedString'
      - name: chains
        in: query
        description: 'Comma-separated list of chains. For example: ''ethereum,bsc''.'
        schema:
          type: string
          description: 'Comma-separated list of chains. For example: ''ethereum,bsc''.'
      - name: flow
        in: query
        description: 'Swap direction relative to base address: ''in'' (receiving token1),
          ''out'' (sending token0), or ''all''.'
        schema:
          type: string
          description: 'Swap direction relative to base address: ''in'' (receiving
            token1), ''out'' (sending token0), or ''all''.'
      - name: tokens
        in: query
        description: Comma-separated list of token addresses or token IDs that appear
          in either token0 or token1.
        schema:
          $ref: '#/components/schemas/CommaDelimitedString'
      - name: from
        in: query
        description: Filter by sender addresses or entities.
        schema:
          $ref: '#/components/schemas/CommaDelimitedString'
      - name: to
        in: query
        description: Filter by receiver addresses or entities.
        schema:
          $ref: '#/components/schemas/CommaDelimitedString'
      - name: timeGte
        in: query
        description: Time range filter (from) in milliseconds (e.g. 1696630274000).
        schema:
          type: string
          description: Time range filter (from) in milliseconds (e.g. 1696630274000).
      - name: timeLte
        in: query
        description: Time range filter (to) in milliseconds (e.g. 1696716674000).
        schema:
          type: string
          description: Time range filter (to) in milliseconds (e.g. 1696716674000).
      - name: timeLast
        in: query
        description: 'Time range filter using relative durations. For example: ''24h'',
          ''7d''.'
        schema:
          type: string
          description: 'Time range filter using relative durations. For example: ''24h'',
            ''7d''.'
      - name: value0Gte
        in: query
        description: Minimum value for token0 (on-chain units).
        style: deepObject
        explode: true
        schema:
          $ref: '#/components/schemas/SafeDecimal'
      - name: value0Lte
        in: query
        description: Maximum value for token0 (on-chain units).
        style: deepObject
        explode: true
        schema:
          $ref: '#/components/schemas/SafeDecimal'
      - name: value1Gte
        in: query
        description: Minimum value for token1 (on-chain units).
        style: deepObject
        explode: true
        schema:
          $ref: '#/components/schemas/SafeDecimal'
      - name: value1Lte
        in: query
        description: Maximum value for token1 (on-chain units).
        style: deepObject
        explode: true
        schema:
          $ref: '#/components/schemas/SafeDecimal'
      - name: usdGte
        in: query
        description: Minimum historical USD value.
        style: deepObject
        explode: true
        schema:
          $ref: '#/components/schemas/SafeDecimal'
      - name: usdLte
        in: query
        description: Maximum historical USD value.
        style: deepObject
        explode: true
        schema:
          $ref: '#/components/schemas/SafeDecimal'
      - name: sortKey
        in: query
        description: Field by which to sort the results. Options include 'time' or
          'usd'.
        schema:
          type: string
          description: Field by which to sort the results. Options include 'time'
            or 'usd'.
      - name: sortDir
        in: query
        description: Sorting direction. Use 'asc' for ascending or 'desc' for descending.
        schema:
          type: string
          description: Sorting direction. Use 'asc' for ascending or 'desc' for descending.
      - name: limit
        in: query
        description: Maximum number of results to return.
        schema:
          type: integer
          description: Maximum number of results to return.
      - name: offset
        in: query
        description: Pagination offset.
        schema:
          type: integer
          description: Pagination offset.
      - name: counterparties
        in: query
        description: Comma-separated list of addresses or entities to treat strictly
          as counterparties.
        schema:
          $ref: '#/components/schemas/CommaDelimitedString'
      - name: senders
        in: query
        description: Filter by sender addresses.
        schema:
          type: array
          items:
            type: string
          description: Filter by sender addresses.
      - name: receivers
        in: query
        description: Filter by receiver addresses.
        schema:
          type: array
          items:
            type: string
          description: Filter by receiver addresses.
      - name: protocols
        in: query
        description: Filter by protocol/DEX addresses or entity IDs.
        schema:
          $ref: '#/components/schemas/CommaDelimitedString'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrichedSwaps'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
