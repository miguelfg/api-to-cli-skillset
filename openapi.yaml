openapi: 3.0.0
info:
  title: REST Countries API
  version: '3.1'
  description: Get information about countries via a RESTful API.
servers:
- url: https://restcountries.com
paths:
  /v3.1/all:
    get:
      summary: List all countries
      tags:
      - Countries
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
  /v3.1/independent:
    get:
      summary: List countries by independence status
      tags:
